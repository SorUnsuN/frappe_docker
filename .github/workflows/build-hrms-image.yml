name: Build Frappe HR Image

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apps.json"
      - "images/custom/Containerfile"
      - ".github/workflows/build-hrms-image.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare apps.json base64
        id: prep
        run: |
          APPS_JSON_BASE64=$(base64 -w 0 apps.json)
          echo "apps_json_base64=$APPS_JSON_BASE64" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/custom/Containerfile
          push: true
          tags: |
            dockermoove/frappe-hrms:v16
            dockermoove/frappe-hrms:latest
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
            APPS_JSON_BASE64=${{ steps.prep.outputs.apps_json_base64 }}
